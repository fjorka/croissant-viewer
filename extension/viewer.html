<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Croissant Viewer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <div class="panelbar">
    <h1>🥐 Croissant Viewer</h1>
    <span class="spacer"></span>
    <label class="filebtn">Open file…<input id="file" type="file" accept=".json,.jsonld,application/json"></label>
    <button id="theme" title="Light / dark">◐</button>
  </div>
  <div class="sub" id="subtitle">Loading…</div>
  <details class="legendbox" id="legendbox">
    <summary>Color key — the six layers</summary>
    <div class="legend" id="legend"></div>
  </details>
  <div id="view"></div>
</div>
<script src="render-engine.js"></script>
<script src="viewer-page.js"></script>
</body>
</html>
